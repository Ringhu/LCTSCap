# Flat caption baseline for the minimal experiment package
phase: 2
description: "Flat caption baseline without hierarchy, aligner, or event head"

data:
  dataset: capture24
  data_root: /cluster1/user1/lctscap_data
  context_lens: [128, 256]
  stride: 64
  use_precomputed_embeddings: false
  caption_source: template

model:
  _config: configs/model/default.yaml
  modules:
    local_encoder: frozen
    channel_fusion: train
    planner: train
    event_head: frozen
    aligner: frozen
    decoder: train
  init_from: ${data_root}/runs/phase1/checkpoints/best.pt

training:
  enabled: true
  optimizer:
    type: adamw
    lr_new: 3.0e-4
    lr_adapter: 1.0e-5
    weight_decay: 0.01
  scheduler:
    type: cosine
    warmup_ratio: 0.05
  batch_size_per_ctx:
    128: 32
    256: 16
  grad_accumulation: 2
  max_epochs: 50
  patience: 7
  loss_weights:
    cap: 1.0
    align: 0.0
    event: 0.0
    coverage: 0.2
  early_stop_metric: "loss"
  checkpoint_dir: ${data_root}/runs/phase2_flat/checkpoints

evaluation:
  run_on: [val]
  metrics: [bleu, rouge, factuality, grounding]
  eval_every_n_epochs: 1

no_hierarchy: true
no_align: true
no_event: true

seed: 42
num_workers: 4
